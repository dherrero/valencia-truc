version: '3.8'

services:
  redis:
    image: redis:alpine

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      - PORT=3333
      - REDIS_URL=redis://redis:6379
    ports:
      - 3333
    depends_on:
      - redis

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - 80
    depends_on:
      - backend
